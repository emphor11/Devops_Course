name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: simple-api
  ECS_CLUSTER: simple-api-cluster
  ECS_SERVICE: simple-api-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 1. Run tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./simple-api
        run: npm ci

      - name: Run linter
        working-directory: ./simple-api
        run: npm run lint

      - name: Run tests
        working-directory: ./simple-api
        run: npm run test:ci

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-junit-report
          path: simple-api/reports/junit.xml

      # Configure AWS credentials for the following steps
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Terraform apply (Infra creation/updates)
      - name: Setup Terraform
        if: github.event_name != 'pull_request'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: github.event_name != 'pull_request'
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        if: github.event_name != 'pull_request'
        working-directory: ./terraform
        run: terraform validate

      - name: Import existing Terraform resources
        if: github.event_name != 'pull_request'
        working-directory: ./terraform
        run: |
          terraform state show aws_s3_bucket.bucket >/dev/null 2>&1 || terraform import aws_s3_bucket.bucket dakshyadav-devops-s3-bucket || true
          terraform state show aws_s3_bucket_versioning.versioning >/dev/null 2>&1 || terraform import aws_s3_bucket_versioning.versioning dakshyadav-devops-s3-bucket || true
          terraform state show aws_s3_bucket_server_side_encryption_configuration.encryption >/dev/null 2>&1 || terraform import aws_s3_bucket_server_side_encryption_configuration.encryption dakshyadav-devops-s3-bucket || true
          terraform state show aws_s3_bucket_public_access_block.public_access >/dev/null 2>&1 || terraform import aws_s3_bucket_public_access_block.public_access dakshyadav-devops-s3-bucket || true

          terraform state show aws_ecs_cluster.main >/dev/null 2>&1 || terraform import aws_ecs_cluster.main "$ECS_CLUSTER" || true

          DEFAULT_VPC_ID=$(aws ec2 describe-vpcs --filters Name=is-default,Values=true --query 'Vpcs[0].VpcId' --output text)
          SECURITY_GROUP_ID=$(aws ec2 describe-security-groups --filters Name=group-name,Values=simple-api-ecs-sg Name=vpc-id,Values="$DEFAULT_VPC_ID" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          if [ -n "$SECURITY_GROUP_ID" ] && [ "$SECURITY_GROUP_ID" != "None" ]; then
            terraform state show aws_security_group.ecs_tasks >/dev/null 2>&1 || terraform import aws_security_group.ecs_tasks "$SECURITY_GROUP_ID" || true
          fi

          SERVICE_ARN=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].serviceArn' --output text 2>/dev/null || true)
          if [ -n "$SERVICE_ARN" ] && [ "$SERVICE_ARN" != "None" ]; then
            terraform state show aws_ecs_service.main >/dev/null 2>&1 || terraform import aws_ecs_service.main "$ECS_CLUSTER/$ECS_SERVICE" || true
          fi

      - name: Terraform Plan
        if: github.event_name != 'pull_request'
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'pull_request'
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      # 3. Login to ECR
      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build, tag, and push Docker image to ECR
      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        working-directory: ./simple-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. Deploy to ECS
      - name: Deploy to Amazon ECS
        if: github.event_name != 'pull_request'
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
